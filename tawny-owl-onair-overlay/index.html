<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tawny Owl ONAIR</title>

<style>
    :root {
        --cycle: 4s;
        --cream: #fff8e8;
        --brown: #5b321f;
        --onair: #b85b48;
        --live: #d72535;
    }

    html,
    body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: transparent;
    }

    body {
        display: grid;
        place-items: center;
    }

    * {
        box-sizing: border-box;
    }

    /*
     * 元画像の比率を基準にした表示領域
     * OBS側も624×1024に設定します。
     */
    #scene {
        position: relative;
        width: min(100vw, calc(100vh * 0.609375));
        aspect-ratio: 624 / 1024;
        overflow: hidden;
        isolation: isolate;
    }

    .full-image {
        position: absolute;
        inset: 0;
        display: block;
        width: 100%;
        height: 100%;
        object-fit: fill;
        pointer-events: none;
        user-select: none;
    }

    /*
     * フクロウの外周に合わせた簡易切り抜き
     * 元画像の白い縁取りも少し残します。
     */
    .owl-silhouette {
        clip-path: polygon(
            49% 3%,
            39% 4%,
            31% 7%,
            23% 8%,
            17% 13%,
            12% 21%,
            10% 31%,
            12% 39%,
            8% 43%,
            8% 58%,
            12% 67%,
            18% 74%,
            20% 83%,
            28% 90%,
            23% 92%,
            19% 96%,
            26% 93%,
            32% 93%,
            33% 99%,
            38% 97%,
            38% 91%,
            58% 91%,
            59% 98%,
            64% 96%,
            64% 91%,
            70% 93%,
            74% 97%,
            77% 94%,
            72% 90%,
            79% 87%,
            85% 79%,
            91% 68%,
            92% 51%,
            89% 41%,
            88% 27%,
            82% 16%,
            73% 8%,
            62% 4%
        );
    }

    /* フクロウ全体の小さな上下運動 */
    #owl-base {
        transform-origin: 50% 78%;
        animation: owlFloat var(--cycle) ease-in-out infinite;
        filter:
            drop-shadow(0 8px 5px rgba(36, 20, 12, 0.36))
            drop-shadow(0 0 7px rgba(255, 250, 225, 0.6));
    }

    /*
     * 頭レイヤー
     * このグループに、頭画像とまぶたをまとめています。
     */
    #head-layer {
        position: absolute;
        inset: 0;
        transform-origin: 49% 36%;
        animation: headMotion var(--cycle) ease-in-out infinite;
        pointer-events: none;
    }

    #head-image {
        clip-path: polygon(
            49% 3%,
            38% 4%,
            29% 8%,
            20% 9%,
            14% 17%,
            10% 27%,
            12% 37%,
            20% 44%,
            31% 48%,
            49% 46%,
            64% 48%,
            78% 43%,
            88% 35%,
            87% 23%,
            80% 13%,
            69% 7%,
            59% 4%
        );
    }

    /* 左翼・右翼を元画像から切り出して重ねる */
    .wing {
        transform-box: fill-box;
        pointer-events: none;
    }

    #left-wing {
        clip-path: polygon(
            7% 40%,
            25% 38%,
            31% 49%,
            29% 69%,
            21% 82%,
            14% 72%,
            8% 59%
        );
        transform-origin: 25% 43%;
        animation: leftWing var(--cycle) ease-in-out infinite;
    }

    #right-wing {
        clip-path: polygon(
            71% 37%,
            88% 39%,
            93% 51%,
            91% 69%,
            80% 86%,
            74% 77%,
            72% 58%
        );
        transform-origin: 75% 43%;
        animation: rightWing var(--cycle) ease-in-out infinite;
    }

    /*
     * 胸部分
     * 元画像を楕円形に切り抜き、ほんの少し拡大します。
     */
    #chest {
        clip-path: ellipse(29% 30% at 50% 61%);
        transform-origin: 50% 70%;
        animation: breathing var(--cycle) ease-in-out infinite;
        pointer-events: none;
    }

    /* まぶた位置 */
    .eyelid-position {
        position: absolute;
        z-index: 5;
        pointer-events: none;
    }

    /*
     * 画像左側の大きな目
     */
    .eyelid-position.left {
        left: 27.4%;
        top: 21.6%;
        width: 18%;
        height: 10%;
        transform: rotate(11deg);
    }

    /*
     * 画像右側の大きな目
     */
    .eyelid-position.right {
        left: 52.6%;
        top: 15.4%;
        width: 17.5%;
        height: 10%;
        transform: rotate(-8deg);
    }

    .eyelid {
        position: absolute;
        inset: 0;
        border-radius: 52% 52% 48% 48%;
        transform-origin: center top;
        transform: scaleY(0);
        opacity: 0;

        background:
            radial-gradient(
                ellipse at 50% 80%,
                #efe0c5 0%,
                #d0ad78 42%,
                #8d612e 75%,
                #52351d 100%
            );

        border-bottom: clamp(2px, 0.6vw, 5px) solid #160f0a;

        box-shadow:
            inset 0 -5px 8px rgba(65, 38, 16, 0.35),
            0 3px 4px rgba(20, 12, 7, 0.25);

        animation: blinkThreeTimes var(--cycle) ease-in-out infinite;
    }

    /*
     * 看板全体
     */
    #sign-wrapper {
        position: absolute;
        z-index: 20;
        left: 8%;
        bottom: 4%;
        width: 84%;
        height: 17%;

        display: grid;
        place-items: center;

        transform: translateY(170%);
        transform-origin: center bottom;

        animation: signEntrance var(--cycle) cubic-bezier(.22, .9, .35, 1.15) infinite;
    }

    /* 看板を吊っている紐 */
    #sign-wrapper::before,
    #sign-wrapper::after {
        content: "";
        position: absolute;
        z-index: -1;
        top: -32%;
        width: 1.6%;
        height: 47%;
        border-radius: 999px;
        background: linear-gradient(
            to right,
            #4c2d1c,
            #e7c895,
            #68452a
        );
        transform-origin: center bottom;
    }

    #sign-wrapper::before {
        left: 29%;
        transform: rotate(19deg);
    }

    #sign-wrapper::after {
        right: 29%;
        transform: rotate(-19deg);
    }

    #sign-glow {
        position: absolute;
        inset: 11% 2%;
        border-radius: 999px;
        background: rgba(255, 34, 56, 0.65);
        filter: blur(20px);
        opacity: 0;
        animation: liveGlow var(--cycle) ease-in-out infinite;
    }

    #sign {
        position: relative;
        width: 100%;
        height: 76%;

        display: grid;
        place-items: center;

        border: clamp(5px, 1vw, 9px) solid var(--cream);
        border-radius: 999px;

        background:
            linear-gradient(
                180deg,
                rgba(255, 255, 255, 0.19),
                transparent 36%
            ),
            var(--onair);

        box-shadow:
            0 8px 0 #4b281d,
            0 12px 16px rgba(34, 18, 12, 0.42),
            inset 0 0 0 4px rgba(70, 30, 21, 0.34);

        animation:
            signSwing var(--cycle) ease-in-out infinite,
            signColor var(--cycle) ease-in-out infinite;
    }

    .label {
        position: absolute;
        inset: 0;

        display: flex;
        align-items: center;
        justify-content: center;

        color: #fffdf4;
        font-family:
            "Arial Black",
            "Arial",
            "Noto Sans JP",
            sans-serif;
        font-weight: 900;
        line-height: 1;

        text-shadow:
            0 4px 0 rgba(80, 26, 22, 0.55),
            0 0 8px rgba(255, 255, 255, 0.25);

        transform-origin: center;
    }

    #onair-label {
        font-size: clamp(32px, 10vw, 76px);
        letter-spacing: -0.06em;
        animation: onairLabel var(--cycle) ease-in-out infinite;
    }

    #live-label {
        gap: 4%;
        font-size: clamp(38px, 11vw, 84px);
        letter-spacing: 0.03em;
        opacity: 0;
        animation: liveLabel var(--cycle) ease-in-out infinite;
    }

    #live-dot {
        display: inline-block;
        width: 0.27em;
        height: 0.27em;
        flex: 0 0 auto;
        border-radius: 50%;
        background: #fffdf4;
        box-shadow: 0 0 12px rgba(255, 255, 255, 0.9);
        animation: liveDot var(--cycle) step-end infinite;
    }

    /* 装飾のキラキラ */
    .sparkle {
        position: absolute;
        z-index: 30;
        width: 4%;
        aspect-ratio: 1;
        opacity: 0;
        pointer-events: none;
        animation: sparkle var(--cycle) ease-in-out infinite;
    }

    .sparkle::before,
    .sparkle::after {
        content: "";
        position: absolute;
        background: #fff5b8;
        border-radius: 999px;
    }

    .sparkle::before {
        left: 42%;
        top: 0;
        width: 16%;
        height: 100%;
    }

    .sparkle::after {
        left: 0;
        top: 42%;
        width: 100%;
        height: 16%;
    }

    .sparkle.s1 {
        left: 10%;
        top: 30%;
    }

    .sparkle.s2 {
        right: 7%;
        top: 20%;
        animation-delay: 0.35s;
    }

    .sparkle.s3 {
        right: 15%;
        top: 49%;
        width: 2.8%;
        animation-delay: 0.7s;
    }

    /*
     * アニメーション
     */

    @keyframes owlFloat {
        0%, 100% {
            transform: translateY(0);
        }

        50% {
            transform: translateY(-0.8%);
        }
    }

    @keyframes headMotion {
        0%, 8% {
            transform: translateY(0) rotate(0deg);
        }

        30% {
            transform: translateY(-0.7%) rotate(-3.5deg);
        }

        55% {
            transform: translateY(0.3%) rotate(-5deg);
        }

        78% {
            transform: translateY(-0.4%) rotate(2deg);
        }

        100% {
            transform: translateY(0) rotate(0deg);
        }
    }

    /*
     * 4秒のうち前半で3回まばたき
     */
    @keyframes blinkThreeTimes {
        0%,
        4%,
        9%,
        14%,
        19%,
        24%,
        100% {
            transform: scaleY(0);
            opacity: 0;
        }

        6.3%,
        11.3%,
        16.3% {
            transform: scaleY(1.08);
            opacity: 1;
        }

        7.4%,
        12.4%,
        17.4% {
            transform: scaleY(0.92);
            opacity: 1;
        }
    }

    @keyframes leftWing {
        0%, 20%, 26%, 32%, 100% {
            transform: rotate(0deg);
        }

        23%,
        29% {
            transform: rotate(2.3deg) translateX(-0.3%);
        }
    }

    @keyframes rightWing {
        0%, 20%, 26%, 32%, 100% {
            transform: rotate(0deg);
        }

        23%,
        29% {
            transform: rotate(-2.3deg) translateX(0.3%);
        }
    }

    @keyframes breathing {
        0%, 100% {
            transform: scaleX(1) scaleY(1);
        }

        25% {
            transform: scaleX(1.008) scaleY(1.005);
        }

        50% {
            transform: scaleX(1.018) scaleY(1.009);
        }

        75% {
            transform: scaleX(1.008) scaleY(1.005);
        }
    }

    /*
     * 28%付近から看板が登場。
     * 最後に下へ戻してループします。
     */
    @keyframes signEntrance {
        0%, 25% {
            transform: translateY(170%) scale(0.92);
        }

        35% {
            transform: translateY(-6%) scale(1.04);
        }

        39% {
            transform: translateY(0) scale(1);
        }

        91% {
            transform: translateY(0) scale(1);
        }

        100% {
            transform: translateY(170%) scale(0.92);
        }
    }

    @keyframes signSwing {
        0%, 39%, 100% {
            transform: rotate(0deg);
        }

        42% {
            transform: rotate(-1.8deg);
        }

        46% {
            transform: rotate(1.3deg);
        }

        50%, 78% {
            transform: rotate(0deg);
        }

        82% {
            transform: rotate(-1deg);
        }

        86% {
            transform: rotate(0deg);
        }
    }

    @keyframes signColor {
        0%, 48%, 80%, 100% {
            background-color: var(--onair);
        }

        53%, 75% {
            background-color: var(--live);
        }
    }

    @keyframes onairLabel {
        0%, 46% {
            opacity: 1;
            transform: scale(1);
        }

        50% {
            opacity: 0;
            transform: scale(0.65) rotate(-5deg);
        }

        77% {
            opacity: 0;
            transform: scale(0.65) rotate(5deg);
        }

        82% {
            opacity: 1;
            transform: scale(1.12);
        }

        86%, 100% {
            opacity: 1;
            transform: scale(1);
        }
    }

    @keyframes liveLabel {
        0%, 48% {
            opacity: 0;
            transform: scale(0.65);
        }

        53% {
            opacity: 1;
            transform: scale(1.14);
        }

        57%, 74% {
            opacity: 1;
            transform: scale(1);
        }

        79%, 100% {
            opacity: 0;
            transform: scale(0.65);
        }
    }

    @keyframes liveDot {
        0%, 52%, 80%, 100% {
            opacity: 0;
        }

        54%, 61%, 68%, 75% {
            opacity: 1;
        }

        58%, 65%, 72%, 78% {
            opacity: 0.25;
        }
    }

    @keyframes liveGlow {
        0%, 49%, 80%, 100% {
            opacity: 0;
            transform: scale(0.9);
        }

        55%, 74% {
            opacity: 0.7;
            transform: scale(1.03);
        }
    }

    @keyframes sparkle {
        0%, 30%, 100% {
            opacity: 0;
            transform: scale(0) rotate(0deg);
        }

        42% {
            opacity: 1;
            transform: scale(1) rotate(90deg);
        }

        59% {
            opacity: 0;
            transform: scale(0) rotate(180deg);
        }
    }
</style>
</head>

<body>

<div id="scene">

    <!-- フクロウ本体 -->
    <img
        id="owl-base"
        class="full-image owl-silhouette"
        src="./tawny-owl.png"
        alt=""
    >

    <!-- 呼吸する胸部分 -->
    <img
        id="chest"
        class="full-image"
        src="./tawny-owl.png"
        alt=""
    >

    <!-- 左翼 -->
    <img
        id="left-wing"
        class="full-image wing"
        src="./tawny-owl.png"
        alt=""
    >

    <!-- 右翼 -->
    <img
        id="right-wing"
        class="full-image wing"
        src="./tawny-owl.png"
        alt=""
    >

    <!-- 頭とまぶた -->
    <div id="head-layer">

        <img
            id="head-image"
            class="full-image"
            src="./tawny-owl.png"
            alt=""
        >

        <div class="eyelid-position left">
            <div class="eyelid"></div>
        </div>

        <div class="eyelid-position right">
            <div class="eyelid"></div>
        </div>

    </div>

    <!-- キラキラ -->
    <div class="sparkle s1"></div>
    <div class="sparkle s2"></div>
    <div class="sparkle s3"></div>

    <!-- ONAIR / LIVE看板 -->
    <div id="sign-wrapper">

        <div id="sign-glow"></div>

        <div id="sign">

            <div id="onair-label" class="label">
                ONAIR
            </div>

            <div id="live-label" class="label">
                <span id="live-dot"></span>
                <span>LIVE</span>
            </div>

        </div>

    </div>

</div>

</body>
</html>
