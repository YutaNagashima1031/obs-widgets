<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Weather Widget</title>
    <!-- 時計と同じ太字のフォントと、日本語用のフォントを読み込む -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&family=Noto+Sans+JP:wght@700;900&display=swap" rel="stylesheet">
    <style>
        /* OBS上で背景を透明にする設定 */
        body {
            margin: 0;
            padding: 20px;
            background-color: transparent; 
            overflow: hidden;
            font-family: 'Montserrat', 'Noto Sans JP', sans-serif;
            font-weight: 800;
        }

        /* 天気ウィジェットの背景枠（乳白色・半透明） */
        .weather-box {
            width: 140px;
            height: 160px; /* 切り替え時に高さが変わらないように固定 */
            /* 背景を50%の白に設定 */
            background-color: rgba(255, 255, 255, 0.5); 
            /* 後ろの映像を少しぼかして、すりガラスのような綺麗な乳白色にする */
            backdrop-filter: blur(6px); 
            -webkit-backdrop-filter: blur(6px); /* OBSのブラウザエンジン用 */
            
            border-radius: 20px;
            box-shadow: 2px 4px 10px rgba(0, 0, 0, 0.15);
            padding: 15px 10px;
            border: 2px solid rgba(255, 255, 255, 0.8); /* 枠線も少し透過した白 */
            
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 中身の要素（ふわっと切り替えるためのコンテナ） */
        .content-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        /* ふわっと切り替わるアニメーション */
        .fade-in {
            animation: fadeInAnim 0.5s ease-in-out;
        }
        @keyframes fadeInAnim {
            0% { opacity: 0; transform: translateY(2px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        /* 地名 */
        .location {
            font-size: 24px;
            color: #333333;
            margin-bottom: 5px;
            letter-spacing: 2px;
        }

        /* 天気アイコン */
        .icon {
            font-size: 55px;
            line-height: 1;
            margin-bottom: 5px;
            font-family: 'Apple Color Emoji', 'Segoe UI Emoji', sans-serif;
        }

        /* 最高気温と最低気温のコンテナ */
        .temp-container {
            font-size: 28px;
            letter-spacing: 1px;
            margin-bottom: 2px;
        }

        /* 最高気温（赤） */
        .temp-max { color: #E35335; }

        /* 区切り線のスラッシュ */
        .slash {
            color: #555555;
            font-size: 22px;
            margin: 0 2px;
        }

        /* 最低気温（青） */
        .temp-min { color: #2D58C9; }

        /* 降水確率 */
        .rain-prob {
            font-size: 24px;
            color: #555555;
            letter-spacing: 1px;
        }
        
        /* 読み込み中の表示用 */
        .loading {
            font-size: 16px;
            color: #666;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="weather-box">
        <!-- 初期状態はLoading表示。データ取得後に切り替わります -->
        <div id="weather-content" class="content-wrapper fade-in">
            <div class="loading" id="loading-text">データを取得中...</div>
        </div>
    </div>

    <script>
        // 7都市のリストと緯度・経度
        const cities = [
            { name: '札幌', lat: 43.0642, lon: 141.3469 },
            { name: '仙台', lat: 38.2682, lon: 140.8694 },
            { name: '新潟', lat: 37.9022, lon: 139.0236 },
            { name: '東京', lat: 35.6895, lon: 139.6917 },
            { name: '名古屋', lat: 35.1815, lon: 136.9064 },
            { name: '大阪', lat: 34.6937, lon: 135.5022 },
            { name: '福岡', lat: 33.5904, lon: 130.4017 }
        ];

        let weatherData = {}; // 取得した天気を保存する場所
        let currentIndex = 0; // 現在表示している都市の番号

        // WMO天気コードを絵文字アイコンに変換する関数
        function getWeatherIcon(weatherCode) {
            if (weatherCode === 0) return "☀️";
            if (weatherCode === 1 || weatherCode === 2) return "⛅";
            if (weatherCode === 3) return "☁️";
            if (weatherCode >= 45 && weatherCode <= 48) return "🌫️";
            if (weatherCode >= 51 && weatherCode <= 67) return "☔";
            if (weatherCode >= 71 && weatherCode <= 77) return "⛄";
            if (weatherCode >= 80 && weatherCode <= 82) return "🌧️";
            if (weatherCode >= 85 && weatherCode <= 86) return "❄️";
            if (weatherCode >= 95) return "⚡";
            return "☁️";
        }

        // 1時間ごとに全7都市の天気データを取得して保存する関数
        async function fetchAllWeatherData() {
            for (const city of cities) {
                try {
                    const response = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${city.lat}&longitude=${city.lon}&daily=weathercode,temperature_2m_max,temperature_2m_min,precipitation_probability_max&timezone=Asia%2FTokyo`);
                    const data = await response.json();

                    // 取得したデータを保存
                    weatherData[city.name] = {
                        icon: getWeatherIcon(data.daily.weathercode[0]),
                        tempMax: Math.round(data.daily.temperature_2m_max[0]),
                        tempMin: Math.round(data.daily.temperature_2m_min[0]),
                        rainProb: data.daily.precipitation_probability_max[0]
                    };
                } catch (error) {
                    console.error(`${city.name}の天気取得エラー`, error);
                }
            }
            
            // 初回読み込み時にデータが揃ったら、すぐに最初の都市(札幌)を表示する
            if (document.getElementById('loading-text')) {
                updateDisplay();
            }
        }

        // 5秒ごとに画面の表示を切り替える関数
        function updateDisplay() {
            // データがまだ取得できていない場合はスキップ
            if (Object.keys(weatherData).length === 0) return;

            const city = cities[currentIndex];
            const data = weatherData[city.name];

            if (data) {
                const container = document.getElementById('weather-content');
                
                // アニメーションを再実行するために、一度クラスを外してつけ直す
                container.classList.remove('fade-in');
                void container.offsetWidth; // これを入れることでアニメーションがリセットされます
                
                // HTMLの中身を書き換え
                container.innerHTML = `
                    <div class="location">${city.name}</div>
                    <div class="icon">${data.icon}</div>
                    <div class="temp-container">
                        <span class="temp-max">${data.tempMax}</span><span class="slash">/</span><span class="temp-min">${data.tempMin}</span>
                    </div>
                    <div class="rain-prob">${data.rainProb}%</div>
                `;
                
                container.classList.add('fade-in');
            }

            // 次の都市へ移動（7番目の次は0番目に戻る）
            currentIndex = (currentIndex + 1) % cities.length;
        }

        // 1. 最初の一回、全都市のデータを取得開始
        fetchAllWeatherData();

        // 2. 5秒(5000ミリ秒)ごとに表示を切り替えるループ
        setInterval(updateDisplay, 5000);

        // 3. 1時間(3600000ミリ秒)ごとに天気データを最新に更新するループ
        setInterval(fetchAllWeatherData, 3600000);
    </script>
</body>
</html>
